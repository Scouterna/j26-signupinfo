name: CI

on:
  push:
    branches:
      - deps/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --frozen --group dev
        working-directory: .

      - name: Run smoke tests
        run: uv run pytest -v
